services:
  # Container Database
  db:
    image: mysql:8.0
    container_name: minmat_puskomlekad_database
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE_NAME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - '127.0.0.1:3001:3306'
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 5

  # Container Redis
  redis:
    image: redis:7-alpine
    container_name: minmat_puskomlekad_redis
    restart: always
    ports:
      - '127.0.0.1:3002:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Container Aplikasi SvelteKit
  app:
    image: minmat_puskomlekad_image:latest
    container_name: minmat_puskomlekad
    restart: always
    # Menambahkan instruksi build agar compose tahu cara membuat image ini
    build:
      context: .
      args:
        - DATABASE_URL=${DATABASE_URL} # Mengoper variabel saat build time
        - BETTER_AUTH_URL=${BETTER_AUTH_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # PENTING: Gunakan nama service 'db' sebagai host, bukan localhost
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: ${PORT}
    ports:
      - '3000:3000'

volumes:
  redis_data:
